name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Lint & Format Check ────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { name: Backend, workdir: apps/backend, linter: python }
          - { name: Frontend, workdir: apps/frontend, linter: node }
          - { name: CLI, workdir: apps/cli, linter: node }

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.linter == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python deps
        if: matrix.linter == 'python'
        run: |
          pip install flake8 black isort mypy
          pip install -r ${{ matrix.workdir }}/requirements.txt
        working-directory: ${{ matrix.workdir }}

      - name: Lint Python
        if: matrix.linter == 'python'
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          black --check .
          isort --check-only .
          mypy .
        working-directory: ${{ matrix.workdir }}

      - name: Set up Node.js
        if: matrix.linter == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.workdir }}/package-lock.json

      - name: Install Node deps
        if: matrix.linter == 'node'
        run: npm ci
        working-directory: ${{ matrix.workdir }}

      - name: Lint JavaScript/TypeScript
        if: matrix.linter == 'node'
        run: npm run lint
        working-directory: ${{ matrix.workdir }}

  # ─── Test ────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { name: Backend, workdir: apps/backend, testcmd: pytest }
          - { name: Frontend, workdir: apps/frontend, testcmd: npm run test }
          - { name: CLI, workdir: apps/cli, testcmd: npm run test }

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.testcmd == 'pytest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python deps & test
        if: matrix.testcmd == 'pytest'
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
          pytest --cov=. --cov-report=xml
        working-directory: ${{ matrix.workdir }}

      - name: Set up Node.js
        if: matrix.testcmd != 'pytest'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.workdir }}/package-lock.json

      - name: Install Node deps & test
        if: matrix.testcmd != 'pytest'
        run: |
          npm ci
          npm run test
        working-directory: ${{ matrix.workdir }}

      - name: Upload coverage
        if: matrix.testcmd == 'pytest'
        uses: codecov/codecov-action@v4
        with:
          files: ./${{ matrix.workdir }}/coverage.xml
          fail-ci-if-error: true

  # ─── Build Docker Images ─────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: true
          tags: prodsynth/backend:latest,prodsynth/backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          file: ./apps/frontend/Dockerfile
          push: true
          tags: prodsynth/frontend:latest,prodsynth/frontend:${{ github.sha }}

  # ─── Deploy to Staging ────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Deploy to Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}
        env:
          RENDER_DEPLOY_HOOK_STAGING: ${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}
