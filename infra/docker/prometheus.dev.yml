# Monitoring configurations for docker-compose

# prometheus.dev.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prodsynth-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: "/metrics"

  - job_name: "prodsynth-neo4j"
    static_configs:
      - targets: ["neo4j:7474"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]