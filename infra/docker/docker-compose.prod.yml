# ProdSynth Production Docker Stack
# Multi-stage build: dev → builder → production

services:
  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
      target: production
    image: prodsynth/backend:latest
    container_name: prodsynth-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - NEO4J_URI=${NEO4J_URI}
      - REDIS_URL=${REDIS_URL}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - prodsynth-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
      target: production
    image: prodsynth/frontend:latest
    container_name: prodsynth-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8000}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      - backend
    networks:
      - prodsynth-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  neo4j:
    image: neo4j:5.15-community
    container_name: prodsynth-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-prodsynth123}
      - NEO4J_PLUGINS=["apoc", "graph-algorithms"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-prodsynth123} 'RETURN 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - prodsynth-net

  redis:
    image: redis:7-alpine
    container_name: prodsynth-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - prodsynth-net

  postgres:
    image: postgres:16-alpine
    container_name: prodsynth-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=prodsynth
      - POSTGRES_USER=${POSTGRES_USER:-prodsynth}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-prodsynth123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prodsynth}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prodsynth-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prodsynth-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - prodsynth-net

  grafana:
    image: grafana/grafana:latest
    container_name: prodsynth-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - prodsynth-net

  loki:
    image: grafana/loki:latest
    container_name: prodsynth-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - prodsynth-net

  promtail:
    image: grafana/promtail:latest
    container_name: prodsynth-promtail
    restart: unless-stopped
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - prodsynth-net

volumes:
  neo4j-data:
  neo4j-logs:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:
  loki-data:

networks:
  prodsynth-net:
    driver: bridge